# openai-pr-triage — run an OpenAI-model pass over your open GitHub PRs.
# Uses curl + gh CLI. Set OPENAI_API_KEY in env.
# Required env: OPENAI_API_KEY, GITHUB_REPO (owner/repo format)
# Output: markdown summary to stdout (logged by CronLord).

[[jobs]]
id          = "openai-pr-triage"
name        = "OpenAI — PR triage"
description = "GPT-class model scans your open PRs and writes a triage list."
category    = "ai"
kind        = "shell"
schedule    = "0 14 * * 1-5"
timezone    = "UTC"
enabled     = false
timeout_sec = 300

command = '''
: "${OPENAI_API_KEY:?required}"
: "${GITHUB_REPO:?required, e.g. myorg/myrepo}"
REPO="$GITHUB_REPO"
PRS=$(gh pr list --repo "$REPO" --state open --json number,title,author,updatedAt --limit 20)
PROMPT=$(printf 'Triage these GitHub PRs. For each: one-sentence summary, priority (P0/P1/P2), first reviewer suggestion. JSON input:\n%s' "$PRS")
curl -sS https://api.openai.com/v1/chat/completions \
  -H "content-type: application/json" \
  -H "authorization: Bearer $OPENAI_API_KEY" \
  --data "$(jq -n --arg p "$PROMPT" '{model:"gpt-4o-mini",messages:[{role:"user",content:$p}]}')" \
  | jq -r '.choices[0].message.content'
'''
