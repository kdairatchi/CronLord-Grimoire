# daily-vault-summary — summarize the last 7 Obsidian daily notes into a weekly digest.
# Uses local Claude Code CLI; model pinned to haiku for speed/cost.
# Adjust VAULT path for your setup.

[[jobs]]
id          = "daily-vault-summary"
name        = "Weekly vault summary"
description = "Claude reads 7 latest daily notes and writes a weekly digest."
category    = "claude"
kind        = "claude"
schedule    = "0 13 * * 1"
timezone    = "UTC"
enabled     = false
timeout_sec = 900
working_dir = "/home/anon"

command = '''
Read the 7 most recent files in /mnt/c/Users/Dr34d/OneDrive/Documents/Obsidian\\ Vault/01\\ -\\ Inbox/Daily/.
Write a one-page digest to /mnt/c/Users/Dr34d/OneDrive/Documents/Obsidian\\ Vault/00\\ -\\ Dashboard/weekly-$(date -u +%G-W%V).md
covering: decisions made, open questions, recurring themes, next actions.
Plain prose. No bullet filler. No emoji. End with a `## Next` section.
'''

[jobs.args]
model          = "claude-haiku-4-5-20251001"
permission_mode = "bypassPermissions"
extra_args     = ["--dangerously-skip-permissions"]
