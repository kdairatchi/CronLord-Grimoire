# ntfy-habit-reminder — push a reminder to a ntfy.sh topic at a set local time.
# Set NTFY_TOPIC (e.g. "my-private-topic-xxxxx") and MESSAGE.

[[jobs]]
id          = "ntfy-habit-reminder"
name        = "ntfy — habit reminder"
description = "Push a plain-text reminder to a self-hosted or ntfy.sh topic."
category    = "personal"
kind        = "http"
schedule    = "0 18 * * *"
timezone    = "America/New_York"
enabled     = false
timeout_sec = 10

command = '''
{
  "method": "POST",
  "url": "https://ntfy.sh/REPLACE-TOPIC",
  "headers": {
    "title": "Daily reminder",
    "tags": "bell",
    "priority": "default"
  },
  "body": "Write two sentences about today. Post a commit. Go for a walk."
}
'''
