# telegram-bot-send — send a message to a Telegram chat via Bot API.
# Create bot with @BotFather, get TELEGRAM_BOT_TOKEN. Get chat_id by messaging
# the bot then `curl api.telegram.org/bot<token>/getUpdates`. Set TELEGRAM_CHAT_ID.
# parse_mode=MarkdownV2 — escape special chars in MESSAGE yourself if needed.

[[jobs]]
id          = "telegram-bot-send"
name        = "Telegram — bot send"
description = "Send a plain or Markdown message to a Telegram chat via bot token."
category    = "communication"
kind        = "shell"
schedule    = "0 13 * * *"
timezone    = "UTC"
enabled     = false
timeout_sec = 60

command = '''
: "${TELEGRAM_BOT_TOKEN:?required}"
: "${TELEGRAM_CHAT_ID:?required}"
MESSAGE="${MESSAGE:-CronLord ping from $(hostname) at $(date -u +%FT%TZ)}"
MODE="${PARSE_MODE:-}"  # leave empty for plain, or set "MarkdownV2" / "HTML"
curl -sS -f "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
  --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
  --data-urlencode "text=${MESSAGE}" \
  ${MODE:+--data-urlencode "parse_mode=${MODE}"}
'''
