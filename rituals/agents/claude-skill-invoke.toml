# claude-skill-invoke — generic wrapper to run any Claude Code skill on a schedule.
# Set SKILL_NAME (without the leading slash) and SKILL_ARGS (optional).
# Requires: claude CLI logged in (`claude login` once on the box).
# Required env: WORK_DIR (set in CronLord UI after import — the directory Claude Code runs from)

[[jobs]]
id          = "claude-skill-invoke"
name        = "Claude skill — scheduled invoke"
description = "Run `claude -p /<SKILL_NAME> <ARGS>` on schedule. Works for any installed skill."
category    = "agents"
kind        = "shell"
schedule    = "0 13 * * *"
timezone    = "UTC"
enabled     = false
timeout_sec = 1800

# Replace /refresh-latest with any installed skill name (with leading slash).
command = '''
: "${WORK_DIR:?required — set to the directory Claude Code should run from}"
SKILL="${SKILL_NAME:-/refresh-latest}"
ARGS="${SKILL_ARGS:-}"
cd "$WORK_DIR"
claude -p "$SKILL $ARGS"
'''

