# claude-subagent-fanout — one Claude Code run fans out into N parallel subagents.
# Claude reads a targets file and dispatches one recon-agent Task per target in
# parallel, then aggregates findings into a single daily summary.
# Requires: claude CLI; recon-agent subagent installed in ~/.claude/agents/.
# Required env: TARGETS_FILE (one root domain per line), RECON_DIR (output root)

[[jobs]]
id          = "claude-subagent-fanout"
name        = "Claude subagent fanout"
description = "Read targets file, spawn one recon-agent per target in parallel, aggregate."
category    = "agents"
kind        = "shell"
schedule    = "0 5 * * *"
timezone    = "UTC"
enabled     = false
timeout_sec = 7200

command = '''
: "${TARGETS_FILE:?required, one root domain per line}"
: "${RECON_DIR:?required, output root for per-target findings}"
mkdir -p "$RECON_DIR"
PROMPT=$(printf \
'Read %s — one root domain per line, lines starting with # are comments.

For each target, spawn a recon-agent subagent in parallel using the Task tool. Give each subagent:
- the domain
- an explicit instruction to write its findings to %s/<domain>/%s.md
- a 20-minute budget

After every subagent completes, read each findings file and write a single daily summary to
%s/summary-%s.md. Structure:
- Target
- New subdomains count
- New hosts-of-interest (admin panels, staging, API gateways)
- Top 3 priority items across all targets

Do not fabricate results. If a subagent returned empty, mark it as empty. No hype.' \
  "$TARGETS_FILE" "$RECON_DIR" "$(date -u +%F)" "$RECON_DIR" "$(date -u +%F)")

claude --dangerously-skip-permissions -p "$PROMPT"
'''
