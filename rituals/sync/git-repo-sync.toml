# git-repo-sync — keep a local repo up to date with origin (fetch only, no merge).
# Safe default: fetches + prunes, never rewrites local work.
# Required env: REPO_DIR (path to the local git repo to sync)

[[jobs]]
id          = "git-repo-sync"
name        = "git fetch (one repo)"
description = "Fetch + prune a local git repo to keep tracking branches fresh."
category    = "sync"
kind        = "shell"
schedule    = "0 */2 * * *"
timezone    = "UTC"
enabled     = false
timeout_sec = 60

command = '''
: "${REPO_DIR:?required, path to the local git repository}"
cd "$REPO_DIR"
git fetch --all --prune --tags --quiet
git log --oneline -1 @{u} 2>/dev/null || true
echo "fetched: $REPO_DIR"
'''
